<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Dinâmico</title>
    <style>
        /* Configurações padrão do corpo */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            transition: background-image 0.5s ease; /* Transição suave */
            background-size: cover;
            background-position: center;
        }

        /* Estilo do Dia */
        .dia {
            background-image: url('https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?q=80&w=2000');
            color: #2c3e50;
        }

        /* Estilo da Noite */
        .noite {
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4b519?q=80&w=2000');
            color: white;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        /* Estilo do Botão */
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="dia"> <h1 id="texto">Olá, Mundo!</h1>
    <button onclick="alternarPeriodo()">Alternar Noite/Dia</button>

    <script>
        function alternarPeriodo() {
            const corpo = document.body;
            
            // Verifica se a classe atual é 'dia'
            if (corpo.classList.contains('dia')) {
                corpo.classList.remove('dia');
                corpo.classList.add('noite');
            } else {
                corpo.classList.remove('noite');
                corpo.classList.add('dia');
            }
        }
    </script>

</body>
</html>
