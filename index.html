<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Céu Completo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 1.5s ease;
            background-size: cover;
            background-position: center;
        }

        .dia { background-image: url('https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?q=80&w=2000'); }
        .noite { background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4b519?q=80&w=2000'); background-color: #020617; }

        /* --- ASTROS --- */
        #astro {
            width: 120px; height: 120px;
            border-radius: 50%;
            transition: all 1s ease;
            z-index: 5;
            margin-bottom: 20px;
        }
        .sol { background: #ffce54; box-shadow: 0 0 60px #ffce54; }
        .lua-cheia { background: #f5f5f5; box-shadow: 0 0 40px #ffffff, 0 0 80px rgba(255,255,255,0.4); }

        /* --- AVIÃO (SÓ DE DIA) --- */
        #aviao {
            position: absolute;
            top: 25%;
            left: -100px; /* Começa fora da tela à esquerda */
            font-size: 40px;
            color: white;
            opacity: 0;
            z-index: 4;
            pointer-events: none;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2));
        }
        .voar-aviao { animation: voar 12s linear infinite; opacity: 1 !important; }

        @keyframes voar {
            0% { left: -100px; transform: rotate(0deg); }
            100% { left: 110%; transform: rotate(0deg); }
        }

        /* --- METEORO E ESTRELAS (SÓ À NOITE) --- */
        .estrela {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0; transition: opacity 1s; box-shadow: 0 0 8px white;
        }
        .noite .estrela { opacity: 1; }

        .meteoro {
            position: absolute; top: 10%; left: 110%;
            width: 150px; height: 2px;
            background: linear-gradient(90deg, white, transparent);
            opacity: 0; transform: rotate(-35deg);
        }
        .animar-meteoro { animation: riscar 4s linear infinite; }
        @keyframes riscar {
            0% { left: 110%; opacity: 0; }
            10% { opacity: 1; }
            30% { left: -20%; opacity: 0; }
            100% { left: -20%; opacity: 0; }
        }

        /* --- INTERFACE --- */
        h1 { color: white; font-size: 5rem; text-shadow: 2px 2px 20px rgba(0,0,0,0.7); z-index: 10; }
        button {
            margin-top: 40px; padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border: none; border-radius: 50px;
            background: white; color: #111; position: relative; z-index: 999;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="dia">

    <div id="aviao" class="voar-aviao">✈️</div> 
    
    <div id="astro" class="sol"></div>
    <h1>Olá, Mundo!</h1>
    <button onclick="mudarTempo()">Mudar para Noite</button>
    <div class="meteoro" id="meteoro"></div>

    <script>
        const corpo = document.body;
        const astro = document.getElementById('astro');
        const meteoro = document.getElementById('meteoro');
        const aviao = document.getElementById('aviao');
        const botao = document.querySelector('button');

        // Criar estrelas ao carregar
        for (let i = 0; i < 70; i++) {
            const estrela = document.createElement('div');
            estrela.className = 'estrela';
            estrela.style.left = Math.random() * 100 + '%';
            estrela.style.top = Math.random() * 100 + '%';
            const tam = Math.random() * 3 + 1;
            estrela.style.width = tam + 'px';
            estrela.style.height = tam + 'px';
            corpo.appendChild(estrela);
        }

        function mudarTempo() {
            if (corpo.classList.contains('dia')) {
                // TROCA PARA NOITE
                corpo.classList.replace('dia', 'noite');
                astro.classList.replace('sol', 'lua-cheia');
                botao.innerHTML = "Mudar para Dia";
                
                meteoro.classList.add('animar-meteoro'); // Liga meteoro
                aviao.classList.remove('voar-aviao');    // Desliga avião
            } else {
                // TROCA PARA DIA
                corpo.classList.replace('noite', 'dia');
                astro.classList.replace('lua-cheia', 'sol');
                botao.innerHTML = "Mudar para Noite";
                
                meteoro.classList.remove('animar-meteoro'); // Desliga meteoro
                aviao.classList.add('voar-aviao');       // Liga avião
            }
        }
    </script>
</body>
</html>
