<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Céu Dinâmico</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 1s ease, filter 1s ease;
            background-size: cover;
            background-position: center;
        }

        /* ESTADO: DIA */
        .dia {
            background-image: url('https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?q=80&w=2000');
            filter: brightness(100%); /* Claridade normal */
        }

        /* ESTADO: NOITE */
        .noite {
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4b519?q=80&w=2000');
            filter: brightness(40%); /* Fica bem escuro */
        }

        /* ÍCONES DO CÉU (Sol/Lua) */
        #astro {
            font-size: 80px;
            margin-bottom: 10px;
            transition: transform 0.8s ease;
        }

        h1 {
            color: white;
            font-size: 4rem;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.7);
            margin: 0;
            z-index: 10;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background: white;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }
    </style>
</head>
<body class="dia">

    <div id="astro">☀️</div>
    <h1>Olá, Mundo!</h1>
    <button onclick="mudarTempo()">Mudar para Noite</button>

    <script>
        function mudarTempo() {
            const corpo = document.body;
            const astro = document.getElementById('astro');
            const botao = document.querySelector('button');

            if (corpo.classList.contains('dia')) {
                // MUDAR PARA NOITE
                corpo.classList.replace('dia', 'noite');
                astro.innerHTML = "🌙";
                botao.innerHTML = "Mudar para Dia";
                astro.style.transform = "rotate(360deg)";
            } else {
                // MUDAR PARA DIA
                corpo.classList.replace('noite', 'dia');
                astro.innerHTML = "☀️";
                botao.innerHTML = "Mudar para Noite";
                astro.style.transform = "rotate(0deg)";
            }
        }
    </script>

</body>
</html>
