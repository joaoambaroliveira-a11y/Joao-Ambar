<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Céu com Lua Cheia</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 1.5s ease;
            background-size: cover;
            background-position: center;
        }

        /* --- ESTADOS --- */
        .dia {
            background-image: url('https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?q=80&w=2000');
        }

        .noite {
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4b519?q=80&w=2000');
            background-color: #020617;
        }

        /* --- LUA CHEIA --- */
        #astro {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            transition: all 1s ease;
            z-index: 5;
            margin-bottom: 20px;
        }

        /* Estilo do Sol */
        .sol {
            background: #ffce54;
            box-shadow: 0 0 60px #ffce54;
        }

        /* Estilo da Lua Cheia */
        .lua-cheia {
            background: #f5f5f5;
            box-shadow: 0 0 40px #ffffff, 0 0 80px rgba(255, 255, 255, 0.4);
            background-image: radial-gradient(circle at 30% 30%, #e0e0e0, #f5f5f5); /* Textura leve */
        }

        /* --- ESTRELAS E METEORO --- */
        .estrela {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 1s;
            box-shadow: 0 0 8px white;
            animation: pulsar 2s infinite alternate;
        }
        .noite .estrela { opacity: 1; }

        @keyframes pulsar { from { transform: scale(0.8); } to { transform: scale(1.2); } }

        .meteoro {
            position: absolute;
            top: 10%; left: 110%; /* Começa fora da tela */
            width: 150px; height: 2px;
            background: linear-gradient(90deg, white, transparent);
            opacity: 0;
            transform: rotate(-35deg);
        }

        .animar-meteoro { animation: riscar 4s linear infinite; }
        @keyframes riscar {
            0% { left: 110%; opacity: 0; }
            10% { opacity: 1; }
            30% { left: -20%; opacity: 0; }
            100% { left: -20%; opacity: 0; }
        }

        /* --- TEXTO E BOTÃO --- */
        h1 {
            color: white;
            font-size: 5rem;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.7);
            z-index: 10;
        }

        button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: white;
            color: #111;
            position: relative; 
            z-index: 999; /* Garante que o botão seja clicável */
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="dia">

    <div id="astro" class="sol"></div>
    <h1>Olá, Mundo!</h1>
    <button onclick="mudarTempo()">Mudar para Noite</button>
    <div class="meteoro" id="meteoro"></div>

    <script>
        const corpo = document.body;
        const astro = document.getElementById('astro');
        const meteoro = document.getElementById('meteoro');
        const botao = document.querySelector('button');

        // Criar estrelas
        for (let i = 0; i < 70; i++) {
            const estrela = document.createElement('div');
            estrela.className = 'estrela';
            estrela.style.left = Math.random() * 100 + '%';
            estrela.style.top = Math.random() * 100 + '%';
            const tam = Math.random() * 3 + 1;
            estrela.style.width = tam + 'px';
            estrela.style.height = tam + 'px';
            corpo.appendChild(estrela);
        }

        function mudarTempo() {
            if (corpo.classList.contains('dia')) {
                corpo.classList.replace('dia', 'noite');
                astro.classList.replace('sol', 'lua-cheia');
                botao.innerHTML = "Mudar para Dia";
                meteoro.classList.add('animar-meteoro');
            } else {
                corpo.classList.replace('noite', 'dia');
                astro.classList.replace('lua-cheia', 'sol');
                botao.innerHTML = "Mudar para Noite";
                meteoro.classList.remove('animar-meteoro');
            }
        }
    </script>
</body>
</html>
