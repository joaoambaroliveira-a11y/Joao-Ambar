<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Céu com Estrelas Brilhantes</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 1.2s ease, filter 1.2s ease;
            background-size: cover;
            background-position: center;
        }

        .dia {
            background-image: url('https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?q=80&w=2000');
            filter: brightness(100%);
        }

        .noite {
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4b519?q=80&w=2000');
            filter: brightness(40%);
            background-color: #020617;
        }

        /* --- ESTRELAS TURBINADAS --- */
        .estrela {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0; 
            transition: opacity 1s ease;
            /* O segredo do brilho está aqui no box-shadow */
            box-shadow: 0 0 10px 2px white, 0 0 20px 5px rgba(255, 255, 255, 0.4);
            animation: pulsar 1.5s infinite alternate;
        }

        .noite .estrela {
            opacity: 1; /* Estrelas totalmente visíveis à noite */
        }

        @keyframes pulsar {
            from { 
                transform: scale(0.8); 
                filter: blur(0px);
                box-shadow: 0 0 8px 2px white;
            }
            to { 
                transform: scale(1.3); 
                filter: blur(1px);
                box-shadow: 0 0 15px 4px white, 0 0 25px 8px rgba(255, 255, 255, 0.6);
            }
        }

        /* --- INTERFACE --- */
        #astro {
            font-size: 100px;
            margin-bottom: 20px;
            z-index: 10;
            transition: transform 1s ease;
        }

        h1 {
            color: white;
            font-size: 5rem;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3), 2px 2px 10px rgba(0,0,0,0.8);
            margin: 0;
            z-index: 10;
        }

        button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: white;
            color: #111;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 10;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="dia">

    <div id="astro">☀️</div>
    <h1>Olá, Mundo!</h1>
    <button onclick="mudarTempo()">Ver a Noite</button>

    <script>
        // Criando as estrelas via JS
        const corpo = document.body;
        for (let i = 0; i < 60; i++) {
            const estrela = document.createElement('div');
            estrela.className = 'estrela';
            
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const tamanho = Math.random() * 4 + 1; // Estrelas um pouco maiores
            const atraso = Math.random() * 3;

            estrela.style.left = x + '%';
            estrela.style.top = y + '%';
            estrela.style.width = tamanho + 'px';
            estrela.style.height = tamanho + 'px';
            estrela.style.animationDelay = atraso + 's';

            corpo.appendChild(estrela);
        }

        function mudarTempo() {
            const astro = document.getElementById('astro');
            const botao = document.querySelector('button');

            if (corpo.classList.contains('dia')) {
                corpo.classList.replace('dia', 'noite');
                astro.innerHTML = "🌙";
                botao.innerHTML = "Ver o Dia";
                astro.style.transform = "rotate(360deg)";
            } else {
                corpo.classList.replace('noite', 'dia');
                astro.innerHTML = "☀️";
                botao.innerHTML = "Ver a Noite";
                astro.style.transform = "rotate(0deg)";
            }
        }
    </script>

</body>
</html>
